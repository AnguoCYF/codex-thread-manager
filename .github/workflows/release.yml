name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install tkinter and PyInstaller
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk
          pip install pyinstaller
      - name: Build Linux binary
        run: |
          pyinstaller --onefile --windowed --name codex-thread-manager-linux --noconfirm --clean codex_thread_manager.py
          chmod +x dist/codex-thread-manager-linux
      - name: Upload Linux binary
        uses: softprops/action-gh-release@v2
        with:
          files: dist/codex-thread-manager-linux
